name: Polling sync

on:
  schedule:
    # Every 6 hours — polls drop throughout the day
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: polling-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # The import-towin-polling Supabase edge function scrapes 270toWin's
      # Texas governor page and refreshes race_polls + the race_polling
      # aggregate using the project's own service role — no secrets needed
      # here. It fails loudly (non-2xx) if the scrape or upsert breaks.
      - name: Trigger 270toWin import
        run: |
          RESP=$(curl -fsS -X POST \
            "https://lohxdfrxnxuxjdvvyfjc.supabase.co/functions/v1/import-towin-polling" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "$RESP"
          echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('ok') else 1)"
