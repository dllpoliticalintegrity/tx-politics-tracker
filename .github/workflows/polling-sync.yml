name: Polling sync

on:
  schedule:
    # Every 6 hours — polls drop throughout the day
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      scan_start:
        description: "RCP scan start id"
        required: false
        default: "8600"
      scan_end:
        description: "RCP scan end id"
        required: false
        default: "8960"
      primaries:
        description: "Include primary polls"
        type: boolean
        required: false
        default: true

concurrency:
  group: polling-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/data-import/rcp/requirements.txt

      - name: Install deps
        run: pip install supabase urllib3

      - name: Run RCP polling import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scripts/data-import/rcp
          ARGS=()
          ARGS+=(--scan-start "${{ github.event.inputs.scan_start || 8600 }}")
          ARGS+=(--scan-end "${{ github.event.inputs.scan_end || 8960 }}")
          if [ "${{ github.event.inputs.primaries || 'true' }}" = "true" ]; then
            ARGS+=(--primaries)
          fi
          python import_polling.py "${ARGS[@]}"
