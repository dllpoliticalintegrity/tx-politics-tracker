name: CA finance sync

on:
  schedule:
    # 09:00 UTC = 02:00 PT; runs after SOS's nightly CAL-ACCESS refresh
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Single stage to run (filings|contributions|expenditures|summaries|loans|ie|ie-contributions). Blank = all."
        required: false
        default: ""

concurrency:
  group: ca-finance-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/data-import/cal-access/requirements.txt

      - name: Install deps
        run: pip install -r scripts/data-import/cal-access/requirements.txt

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          df -h

      - name: Run import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CAL_ACCESS_WORK_DIR: ${{ runner.temp }}/calaccess
        run: |
          cd scripts/data-import/cal-access
          if [ -n "${{ github.event.inputs.only }}" ]; then
            python import_ca_finance.py --only ${{ github.event.inputs.only }}
          else
            python import_ca_finance.py
          fi

      - name: Refresh materialized views
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -fsS -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/refresh_ca_finance_views" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'
